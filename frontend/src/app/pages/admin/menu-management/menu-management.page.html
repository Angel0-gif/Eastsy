<ion-content class="admin-content">
  <div class="admin-wrap">

    <div class="admin-topbar">
      <div class="admin-brand">
        <ion-icon name="book-outline" style="vertical-align: middle; margin-right: 4px;"></ion-icon> 
        Menu Management
      </div>
      <button class="add-btn" (click)="openAdd()">+ Add Item</button>
    </div>

    <div class="admin-nav">
      <div class="nav-item" (click)="go('dashboard')">
        <ion-icon name="bar-chart-outline"></ion-icon> Dashboard
      </div>
      <div class="nav-item active" (click)="go('menu')">
        <ion-icon name="book-outline"></ion-icon> Menu
      </div>
      <div class="nav-item" (click)="go('tables')">
        <ion-icon name="easel-outline"></ion-icon> Tables
      </div>
      <div class="nav-item" (click)="go('orders')">
        <ion-icon name="cart-outline"></ion-icon> Orders
      </div>
      <div class="nav-item" (click)="go('reports')">
        <ion-icon name="trending-up-outline"></ion-icon> Reports
      </div>
    </div>

    <div class="cat-row">
      <div *ngFor="let c of categories"
        class="cat-pill" [class.active]="filterCat === c"
        (click)="filterCat = c">
        {{ c | titlecase }}
      </div>
    </div>

    <div class="items-list">
      <div *ngFor="let item of filtered" class="item-card">
        
        <div class="item-image-wrapper">
          <img *ngIf="item.image" [src]="getImageUrl(item.image)" class="menu-item-thumb" alt="{{ item.name }}">
          <div *ngIf="!item.image" class="item-emoji-fallback">{{ item.emoji }}</div>
        </div>

        <div class="item-info">
          <div class="item-name">{{ item.name }}</div>
          <div class="item-desc">{{ item.description }}</div>
          <div class="item-meta">
            <span class="item-cat">{{ item.category | titlecase }}</span>
            <span class="item-price">{{ item.price | number }} XAF</span>
          </div>
        </div>
        
        <div class="item-actions">
          <div class="avail-toggle" [class.on]="item.available" (click)="toggleAvail(item)">
            <ion-icon [name]="item.available ? 'checkmark-circle' : 'close-circle'" 
                      [color]="item.available ? 'success' : 'danger'"></ion-icon>
          </div>
          <button class="action-btn edit" (click)="openEdit(item)">
            <ion-icon name="create-outline"></ion-icon>
          </button>
          <button class="action-btn del" (click)="deleteItem(item)">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </div>
    </div>

  </div>

  <div class="form-overlay" *ngIf="showForm" (click)="cancel()"></div>
  <div class="form-panel" *ngIf="showForm">
    <div class="form-header">
      <span class="form-title">{{ editingId ? 'Edit Item' : 'Add Menu Item' }}</span>
      <button class="form-close" (click)="cancel()">✕</button>
    </div>
    <div class="form-body">
      
      <div class="fgroup">
        <label>Item Photo (optional)</label>
        <input type="file" accept="image/*" class="ainput file-input" (change)="onImageSelected($event)">
        <img *ngIf="imagePreview" [src]="imagePreview"
          style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-top:8px;">
      </div>

      <div class="fgroup">
        <label>Emoji Fallback</label>
        <input [(ngModel)]="form.emoji" class="ainput" placeholder="🍽️" maxlength="4">
      </div>

      <div class="fgroup">
        <label>Name *</label>
        <input [(ngModel)]="form.name" class="ainput" placeholder="e.g. Poulet DG">
      </div>
      
      <div class="fgroup">
        <label>Description</label>
        <textarea [(ngModel)]="form.description" class="ainput" rows="2" placeholder="Short description"></textarea>
      </div>
      
      <div class="fgroup">
        <label>Price (XAF) *</label>
        <input [(ngModel)]="form.price" class="ainput" type="number" placeholder="0">
      </div>
      
      <div class="fgroup">
        <label>Category</label>
        <select [(ngModel)]="form.category" class="ainput aselect">
          <option value="starter">Starter</option>
          <option value="main">Main Course</option>
          <option value="dessert">Dessert</option>
          <option value="drinks">Drinks</option>
          <option value="special">Chef's Special</option>
        </select>
      </div>
      
      <div class="fgroup toggle-group">
        <label>Available</label>
        <div class="toggle-switch" [class.on]="form.available" (click)="form.available = !form.available">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>
    
    <div class="form-footer">
      <button class="fbtn cancel" (click)="cancel()">Cancel</button>
      <button class="fbtn save" (click)="save()">{{ editingId ? 'Update' : 'Add Item' }}</button>
    </div>
  </div>

</ion-content>
