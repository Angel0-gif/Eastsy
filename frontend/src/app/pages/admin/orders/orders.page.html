<ion-content class="admin-content">
  <div class="admin-wrap">
    
    <div class="admin-topbar">
      <div class="admin-brand">
        <ion-icon name="cart-outline" style="vertical-align: middle; margin-right: 4px;"></ion-icon> 
        Orders
      </div>
      <span class="order-count">{{ filtered.length }} orders</span>
    </div>

    <div class="filter-row">
      <div *ngFor="let s of statuses"
        class="filter-pill" [class.active]="filterStatus === s"
        (click)="filterStatus = s">
        {{ s === 'all' ? 'All' : (s | titlecase) }}
      </div>
    </div>

    <div class="orders-list">
      <div *ngFor="let o of filtered" class="order-card">
        
        <div class="order-head" (click)="toggle(o.id)">
          <div class="oh-left">
            <span class="oid">{{ o.id }}</span>
            <span class="otable">Table {{ o.table }}</span>
          </div>
          <div class="oh-right">
            <span class="status-pill"
              [class.preparing]="o.status==='preparing'"
              [class.delivered]="o.status==='delivered'"
              [class.received]="o.status==='received'"
              [class.paid]="o.status==='paid'"
              [class.confirmed]="o.status==='confirmed'"
              [class.on_the_way]="o.status==='on_the_way'">
              {{ o.status | titlecase }}
            </span>
            <span class="chevron">
              <ion-icon [name]="expandedId === o.id ? 'chevron-up-outline' : 'chevron-down-outline'"></ion-icon>
            </span>
          </div>
        </div>

        <div class="order-body" *ngIf="expandedId === o.id">
          <div class="order-items">
            <div *ngFor="let item of o.items" class="oi-row">
              <span>{{ item.name }}</span>
              <span>×{{ item.qty }}</span>
            </div>
          </div>
          <div class="order-meta">
            <span class="ometa-total">{{ o.total }} XAF</span>
            <span class="ometa-time">{{ o.time }}</span>
          </div>
          <div class="order-footer">
            <span class="ophone">
              <ion-icon name="call-outline" style="vertical-align: middle; margin-right: 4px;"></ion-icon>
              {{ o.phone }}
            </span>
            <button class="advance-btn" (click)="advance(o)"
              *ngIf="o.status !== 'delivered' && o.status !== 'paid'">
              Advance → {{ statusFlow[statusFlow.indexOf(o.status)+1] | titlecase }}
            </button>
          </div>
        </div>

      </div>
    </div>

    <div style="height:24px;"></div>
  </div>
</ion-content>
